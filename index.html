<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAMS BITE — Handcrafted Delights</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.0.1/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0e0c0a;
      --parchment: #faf6f0;
      --paper: #fffdf9;
      --rust: #c94c1e;
      --rust-hover: #b8401a;
      --rust-light: #e8673a;
      --rust-pale: #fdf0ea;
      --rust-ultra: #fff5f0;
      --gold: #b8873a;
      --gold-light: #d4a85c;
      --gold-pale: #fdf8ee;
      --stone: #5e5349;
      --stone-mid: #8b7d73;
      --stone-light: #b0a49c;
      --border: rgba(94,83,73,0.12);
      --border-strong: rgba(94,83,73,0.22);
      --shadow-xs: 0 1px 4px rgba(14,12,10,0.05);
      --shadow-sm: 0 2px 12px rgba(14,12,10,0.07);
      --shadow-md: 0 8px 32px rgba(14,12,10,0.10);
      --shadow-lg: 0 20px 56px rgba(14,12,10,0.13);
      --shadow-xl: 0 36px 80px rgba(14,12,10,0.16);
      --ease: cubic-bezier(0.22,1,0.36,1);
      --ease2: cubic-bezier(0.65,0,0.35,1);
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Outfit', sans-serif; background: var(--paper); color: var(--ink); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--parchment); }
    ::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 10px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideRight { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:none; } }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes floatSlow { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-14px) rotate(1deg)} }
    @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    @keyframes lineGrow { from{width:0} to{width:36px} }
    @keyframes starPop { 0%{transform:scale(1)} 40%{transform:scale(1.4)} 100%{transform:scale(1)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes toastSlide { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes modalIn { from{opacity:0;transform:translateY(32px) scale(0.95)} to{opacity:1;transform:none} }
    @keyframes cartSlideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes cartSlideOut { from{transform:translateX(0);opacity:1} to{transform:translateX(100%);opacity:0} }
    @keyframes badgePop { 0%{transform:scale(1)} 40%{transform:scale(1.6)} 100%{transform:scale(1)} }
    @keyframes itemAdded { 0%{transform:scale(1);background:var(--rust-pale)} 30%{transform:scale(1.03);background:#dcf5e8} 100%{transform:scale(1);background:var(--rust-pale)} }
    @keyframes flyToCart { 0%{transform:scale(1);opacity:1} 50%{transform:scale(0.6) translateY(-20px);opacity:0.7} 100%{transform:scale(0);opacity:0} }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 200; height: 70px;
      padding: 0 5%; display: flex; align-items: center; justify-content: space-between;
      transition: all 0.4s var(--ease);
      animation: fadeIn 0.5s ease both;
    }
    nav.scrolled {
      background: rgba(255,253,249,0.95);
      backdrop-filter: blur(24px) saturate(1.5);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 20px rgba(14,12,10,0.06);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900;
      color: var(--ink); cursor: pointer; transition: color 0.2s; display: flex; align-items: baseline; gap: 4px;
      z-index: 201; letter-spacing: -0.01em;
    }
    .nav-logo span { color: var(--rust); }
    .nav-logo sup {
      font-size: 0.42rem; font-family: 'Outfit', sans-serif; font-weight: 700;
      letter-spacing: 0.25em; color: var(--rust); text-transform: uppercase; vertical-align: super;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
    .nav-links a {
      text-decoration: none; color: var(--stone); font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; position: relative; padding-bottom: 2px;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
      background: linear-gradient(90deg, var(--rust), var(--gold));
      transition: width 0.35s var(--ease); border-radius: 2px;
    }
    .nav-links a:hover { color: var(--rust); }
    .nav-links a:hover::after { width: 100%; }
    .nav-right { display: flex; align-items: center; gap: 0.7rem; z-index: 201; }
    .mobile-menu-btn { display: none; background: none; border: none; font-size: 1.5rem; color: var(--ink); cursor: pointer; }

    .sign-btn {
      display: flex; align-items: center; gap: 0.45rem;
      background: var(--rust); color: #fff;
      padding: 8px 20px; border-radius: 40px; border: none;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.78rem;
      letter-spacing: 0.04em; cursor: pointer; transition: all 0.25s var(--ease);
      box-shadow: 0 4px 16px rgba(201,76,30,0.28);
    }
    .sign-btn:hover { background: var(--rust-hover); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(201,76,30,0.38); }
    .user-pill {
      display: none; align-items: center; gap: 0.55rem;
      background: var(--rust-pale); border: 1px solid rgba(201,76,30,0.18);
      padding: 4px 14px 4px 5px; border-radius: 30px; cursor: pointer; transition: all 0.2s;
    }
    .user-pill:hover { background: #fde8dc; transform: translateY(-1px); }
    .user-pill-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--rust); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.74rem; overflow: hidden; flex-shrink: 0;
    }
    .user-pill-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-pill-name { font-size: 0.78rem; font-weight: 600; color: var(--rust); max-width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── CART BUTTON IN NAV ── */
    .cart-nav-btn {
      position: relative; background: var(--ink); color: #fff; border: none;
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s var(--ease);
      box-shadow: 0 4px 14px rgba(14,12,10,0.2);
    }
    .cart-nav-btn:hover { background: var(--rust); transform: translateY(-1px) scale(1.05); box-shadow: 0 6px 20px rgba(201,76,30,0.35); }
    .cart-badge {
      position: absolute; top: -5px; right: -5px;
      background: var(--rust); color: #fff;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 0.62rem; font-weight: 700;
      display: none; align-items: center; justify-content: center;
      border: 2px solid var(--paper);
    }
    .cart-badge.show { display: flex; animation: badgePop 0.3s var(--ease); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      background: var(--parchment);
      display: grid; grid-template-columns: 1fr 1fr; align-items: center;
      padding: 110px 5% 80px; gap: 5rem; position: relative; overflow: hidden;
    }
    .hero-bg-circle {
      position: absolute; border-radius: 50%; pointer-events: none;
    }
    .hero-bg-circle.c1 {
      width: 600px; height: 600px; right: -80px; top: -100px;
      background: radial-gradient(circle, rgba(201,76,30,0.06) 0%, transparent 70%);
      animation: floatSlow 12s ease-in-out infinite;
    }
    .hero-bg-circle.c2 {
      width: 400px; height: 400px; left: -100px; bottom: -80px;
      background: radial-gradient(circle, rgba(184,135,58,0.07) 0%, transparent 70%);
      animation: floatSlow 15s 2s ease-in-out infinite;
    }
    .hero-bg-grain {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 200px;
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-eyebrow {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;
      animation: fadeUp 0.7s 0.1s var(--ease) both;
    }
    .eyebrow-line { width: 36px; height: 2px; background: linear-gradient(90deg, var(--rust), var(--gold)); border-radius: 2px; animation: lineGrow 0.8s 0.3s ease both; }
    .eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rust); animation: pulseDot 2s infinite; }
    .eyebrow-text { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--rust); }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 5.5vw, 4.8rem);
      line-height: 1.05; color: var(--ink); font-weight: 900; margin-bottom: 1.3rem;
      animation: fadeUp 0.8s 0.2s var(--ease) both;
    }
    .hero h1 .thin { font-weight: 400; display: block; }
    .hero h1 .italic-em {
      font-style: italic; color: var(--rust);
      background: linear-gradient(135deg, var(--rust) 20%, var(--gold) 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-desc {
      font-size: 1rem; line-height: 1.78; color: var(--stone); font-weight: 300;
      max-width: 430px; margin-bottom: 2.2rem;
      animation: fadeUp 0.8s 0.3s var(--ease) both;
    }
    .hero-actions { display: flex; gap: 0.9rem; flex-wrap: wrap; align-items: center; animation: fadeUp 0.8s 0.4s var(--ease) both; }
    .btn-primary {
      background: var(--rust); color: #fff;
      padding: 13px 28px; border-radius: 40px; border: none;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem;
      letter-spacing: 0.04em; cursor: pointer; transition: all 0.28s var(--ease);
      text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 8px 24px rgba(201,76,30,0.3); position: relative; overflow: hidden;
    }
    .btn-primary::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      transform: translateX(-100%); transition: transform 0.5s ease;
    }
    .btn-primary:hover::before { transform: translateX(100%); }
    .btn-primary:hover { background: var(--rust-hover); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,76,30,0.4); }
    .btn-ghost {
      background: transparent; color: var(--stone);
      padding: 13px 24px; border-radius: 40px; border: 1.5px solid var(--border-strong);
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.85rem;
      cursor: pointer; transition: all 0.22s; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn-ghost:hover { border-color: var(--rust); color: var(--rust); transform: translateY(-1px); background: var(--rust-ultra); }
    .hero-stats {
      display: flex; gap: 2.5rem; margin-top: 3rem; padding-top: 2.5rem;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.8s 0.55s var(--ease) both;
    }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1; }
    .stat-desc { font-size: 0.68rem; color: var(--stone-light); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 5px; }

    /* ── HERO VISUAL ── */
    .hero-visual { position: relative; z-index: 1; display: flex; justify-content: center; align-items: center; animation: slideRight 0.9s 0.4s var(--ease) both; }
    .hero-card-stack { position: relative; width: 100%; max-width: 400px; margin: 0 auto; }
    .hero-main-card {
      background: #fff; border-radius: 24px; padding: 2.4rem;
      box-shadow: 0 32px 80px rgba(14,12,10,0.13), 0 4px 16px rgba(14,12,10,0.05);
      border: 1px solid var(--border); animation: float 7s 1s ease-in-out infinite;
    }
    .hero-card-tag {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--rust-ultra); color: var(--rust);
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 30px; margin-bottom: 1.2rem; border: 1px solid rgba(201,76,30,0.15);
    }
    .tag-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--rust); animation: pulseDot 2s infinite; }
    .hero-card-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--ink); font-weight: 700; margin-bottom: 0.5rem; }
    .hero-card-sub { font-size: 0.84rem; color: var(--stone); font-weight: 300; line-height: 1.65; }
    .hero-card-items { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1.5rem; }
    .hero-chip {
      background: var(--parchment); color: var(--stone); font-size: 0.74rem; padding: 5px 12px;
      border-radius: 20px; border: 1px solid var(--border); font-weight: 400; transition: all 0.2s; cursor: default;
    }
    .hero-chip:hover { background: var(--rust-pale); color: var(--rust); border-color: rgba(201,76,30,0.2); }
    .hero-float {
      position: absolute; background: #fff; border-radius: 16px;
      padding: 0.9rem 1.2rem;
      box-shadow: 0 12px 40px rgba(14,12,10,0.12), 0 2px 8px rgba(14,12,10,0.06);
      border: 1px solid var(--border);
    }
    .hero-float.top-right { top: -32px; right: -26px; animation: float 6s 0.5s ease-in-out infinite; }
    .hero-float.bot-left { bottom: -28px; left: -20px; animation: float 8s 1.5s ease-in-out infinite; }
    .float-label { font-size: 0.65rem; color: var(--stone-light); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 2px; }
    .float-val { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--rust); }

    /* ── TRUST BAR ── */
    .trust-bar {
      background: var(--ink); padding: 14px 5%;
      display: flex; align-items: center; justify-content: center; gap: 2.5rem; flex-wrap: wrap;
    }
    .trust-item {
      display: flex; align-items: center; gap: 0.55rem;
      font-size: 0.74rem; font-weight: 500; color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
    }
    .trust-item span.icon { display: flex; align-items: center; justify-content: center; }
    .trust-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); }

    /* ── SECTIONS ── */
    section { padding: 96px 5%; }
    .section-kicker {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--rust); display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.65rem;
    }
    .section-kicker::before { content: ''; width: 20px; height: 2px; background: linear-gradient(90deg, var(--rust), var(--gold)); border-radius: 2px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: clamp(1.9rem, 3vw, 2.7rem); font-weight: 700; color: var(--ink); line-height: 1.12; margin-bottom: 0.65rem; }
    .section-sub { font-size: 0.93rem; color: var(--stone); font-weight: 300; line-height: 1.8; max-width: 480px; }
    .section-head-row { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 3rem; }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s var(--ease), transform 0.7s var(--ease); }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }

    /* ── PRODUCTS ── */
    #products { background: var(--parchment); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(268px, 1fr)); gap: 1.4rem; }

    .product-card {
      background: #fff; border-radius: 18px; border: 1px solid var(--border);
      overflow: hidden; cursor: pointer; transition: all 0.35s var(--ease);
      position: relative; display: flex; flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-7px) scale(1.01);
      box-shadow: 0 28px 64px rgba(14,12,10,0.12), 0 4px 16px rgba(14,12,10,0.06);
      border-color: rgba(201,76,30,0.2);
    }
    .product-card.in-cart { border-color: rgba(22,191,120,0.35); }
    .product-img-wrap { height: 200px; position: relative; overflow: hidden; background: var(--rust-pale); flex-shrink: 0; }
    .product-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.55s var(--ease), filter 0.4s;
      filter: brightness(0.97) saturate(1.05);
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.09); filter: brightness(1.04) saturate(1.12); }
    .product-img-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 45%, rgba(14,12,10,0.25) 100%);
      pointer-events: none; z-index: 1;
    }
    .product-img-fallback {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 700;
      color: var(--rust); opacity: 0.15; z-index: 0;
    }
    .product-badge {
      position: absolute; top: 12px; right: 12px; z-index: 3;
      background: var(--rust); color: #fff;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 30px;
      box-shadow: 0 3px 10px rgba(201,76,30,0.4);
    }
    .product-rating-badge {
      position: absolute; bottom: 12px; left: 12px; z-index: 3;
      background: rgba(14,12,10,0.75); backdrop-filter: blur(8px);
      color: #fff; border-radius: 30px; padding: 4px 10px;
      display: flex; align-items: center; gap: 4px;
      font-size: 0.72rem; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
    }
    .product-rating-badge .rb-star { color: var(--gold-light); font-size: 0.75rem; }
    .product-rating-badge .rb-count { opacity: 0.6; font-size: 0.65rem; font-weight: 400; }
    .product-card:hover .product-rating-badge { background: rgba(201,76,30,0.85); }
    .product-rating-badge.no-reviews { opacity: 0.65; }

    .product-body { padding: 1.25rem 1.4rem 1.5rem; flex: 1; display: flex; flex-direction: column; }
    .product-cat { font-size: 0.64rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stone-light); margin-bottom: 0.3rem; }
    .product-name { font-family: 'Playfair Display', serif; font-size: 1.22rem; font-weight: 700; color: var(--ink); margin-bottom: 0.35rem; line-height: 1.2; }
    .product-desc { font-size: 0.8rem; color: var(--stone); font-weight: 300; line-height: 1.62; margin-bottom: 1rem; flex: 1; }
    .product-stars-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 0.85rem;
    }
    .psr-stars { display: flex; gap: 2px; }
    .psr-star { font-size: 0.72rem; color: #e0d8ce; }
    .psr-star.filled { color: var(--gold); }
    .psr-avg { font-size: 0.8rem; font-weight: 700; color: var(--ink); font-family: 'Playfair Display', serif; }
    .psr-sep { width: 1px; height: 10px; background: var(--border); }
    .psr-count { font-size: 0.72rem; color: var(--stone-light); }
    .psr-none { font-size: 0.72rem; color: var(--stone-light); font-style: italic; }

    .product-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 0.9rem; border-top: 1px solid var(--border); }
    .product-price { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; color: var(--rust); }

    /* ── QTY CONTROLS on card ── */
    .qty-controls {
      display: flex; align-items: center; gap: 0; border-radius: 30px;
      border: 1.5px solid var(--border); overflow: hidden; background: var(--parchment);
      transition: border-color 0.2s;
    }
    .qty-controls:focus-within, .qty-controls:hover { border-color: rgba(201,76,30,0.4); }
    .qty-btn {
      background: none; border: none; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; color: var(--stone);
      transition: all 0.18s; font-weight: 600;
    }
    .qty-btn:hover { color: var(--rust); background: var(--rust-pale); }
    .qty-num {
      font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700;
      color: var(--ink); min-width: 28px; text-align: center; line-height: 30px;
      padding: 0 2px;
    }

    /* ── ADD TO CART BTN ── */
    .add-to-cart-btn {
      background: var(--ink); color: #fff; border: none; border-radius: 40px;
      padding: 7px 14px; font-size: 0.72rem; font-weight: 700;
      cursor: pointer; transition: all 0.22s; font-family: 'Outfit', sans-serif;
      letter-spacing: 0.03em; display: flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }
    .add-to-cart-btn:hover { background: var(--rust); transform: translateY(-1px); box-shadow: 0 5px 16px rgba(201,76,30,0.38); }
    .add-to-cart-btn.added { background: #16BF78; }
    .add-to-cart-btn.added:hover { background: #14a86a; }

    /* ── CART DRAWER ── */
    .cart-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(14,12,10,0.5); backdrop-filter: blur(6px);
      display: none; opacity: 0; transition: opacity 0.3s;
    }
    .cart-overlay.open { display: block; opacity: 1; }

    .cart-drawer {
      position: fixed; top: 0; right: -420px; height: 100vh; height: 100dvh; width: 420px; max-width: 100vw;
      background: var(--paper); z-index: 501;
      box-shadow: -20px 0 60px rgba(14,12,10,0.18);
      display: flex; flex-direction: column;
      transition: right 0.45s var(--ease);
      border-left: 1px solid var(--border);
    }
    .cart-drawer.open { right: 0; }

    .cart-header {
      padding: 1.4rem 1.6rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
      background: #fff;
    }
    .cart-title {
      font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--ink);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .cart-count-pill {
      background: var(--rust); color: #fff;
      font-size: 0.7rem; font-weight: 700; font-family: 'Outfit', sans-serif;
      padding: 2px 8px; border-radius: 20px;
    }
    .cart-close-btn {
      width: 34px; height: 34px; border-radius: 50%; background: var(--parchment); border: none;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      color: var(--stone); font-size: 0.85rem; transition: all 0.2s;
    }
    .cart-close-btn:hover { background: var(--rust-pale); color: var(--rust); }

    .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.6rem; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    .cart-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--stone-light); text-align: center; gap: 1rem;
      padding: 2rem;
    }
    .cart-empty-icon { font-size: 3.5rem; opacity: 0.25; }
    .cart-empty h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--stone); }
    .cart-empty p { font-size: 0.84rem; font-weight: 300; }

    .cart-item {
      display: flex; gap: 1rem; align-items: center; padding: 1rem 0;
      border-bottom: 1px solid var(--border); transition: all 0.3s;
      animation: fadeIn 0.3s ease;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-img {
      width: 54px; height: 54px; border-radius: 10px; flex-shrink: 0; overflow: hidden;
      background: var(--rust-pale); display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--rust); opacity: 0.6;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; opacity: 1; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-weight: 600; font-size: 0.88rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-cat { font-size: 0.68rem; color: var(--stone-light); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
    .cart-item-qty {
      display: flex; align-items: center; gap: 0; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--parchment); flex-shrink: 0;
    }
    .cart-qty-btn {
      background: none; border: none; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--stone); transition: all 0.15s; font-weight: 600; font-size: 0.9rem;
    }
    .cart-qty-btn:hover { color: var(--rust); }
    .cart-qty-num { font-size: 0.82rem; font-weight: 700; color: var(--ink); min-width: 24px; text-align: center; }
    .cart-item-remove {
      background: none; border: none; width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--stone-light); transition: all 0.2s; flex-shrink: 0;
    }
    .cart-item-remove:hover { background: #fee; color: #e53; }

    .cart-note-wrap { padding: 0 1.6rem 1rem; }
    .cart-note-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-bottom: 0.45rem; }
    .cart-note {
      width: 100%; background: var(--parchment); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      font-family: 'Outfit', sans-serif; font-size: 0.82rem; color: var(--ink);
      resize: none; outline: none; min-height: 68px; line-height: 1.55; transition: border-color 0.2s;
    }
    .cart-note:focus { border-color: var(--rust); }

    .cart-footer { padding: 1.2rem 1.6rem; border-top: 1px solid var(--border); background: #fff; flex-shrink: 0; }
    .cart-summary {
      background: var(--parchment); border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 1rem; border: 1px solid var(--border);
    }
    .cart-summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--stone); margin-bottom: 0.3rem; }
    .cart-summary-row:last-child { margin-bottom: 0; padding-top: 0.5rem; border-top: 1px dashed var(--border); margin-top: 0.5rem; font-weight: 700; font-size: 0.84rem; color: var(--ink); }

    /* ── TRUCK BUTTON (ORDER BUTTON) ── */
    .truck-button {
      --color: #fff;
      --background: #2B3044;
      --tick: #16BF78;
      --base: #0D0F18;
      --wheel: #2B3044;
      --wheel-inner: #646B8C;
      --wheel-dot: #fff;
      --back: #6D58FF;
      --back-inner: #362A89;
      --back-inner-shadow: #2D246B;
      --front: #A6ACCD;
      --front-shadow: #535A79;
      --front-light: #FFF8B1;
      --window: #2B3044;
      --window-shadow: #404660;
      --street: #646B8C;
      --street-fill: #404660;
      --box: #DCB97A;
      --box-shadow: #B89B66;
      padding: 12px 0;
      width: 100%;
      cursor: pointer;
      text-align: center;
      position: relative;
      border: none;
      outline: none;
      color: var(--color);
      background: var(--background);
      border-radius: var(--br, 14px);
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      transform-style: preserve-3d;
      transform: rotateX(var(--rx, 0deg)) translateZ(0);
      transition: transform 0.5s, border-radius 0.3s linear var(--br-d, 0s);
      font-family: 'Outfit', sans-serif;
    }
    .truck-button:before, .truck-button:after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 6px;
      display: block;
      background: var(--b, var(--street));
      transform-origin: 0 100%;
      transform: rotateX(90deg) scaleX(var(--sy, 1));
    }
    .truck-button .default, .truck-button .success {
      display: block;
      font-weight: 600;
      font-size: 0.88rem;
      line-height: 24px;
      opacity: var(--o, 1);
      transition: opacity 0.3s;
      letter-spacing: 0.04em;
    }
    .truck-button .success {
      --o: 0;
      position: absolute;
      top: 12px;
      left: 0;
      right: 0;
    }
    .truck-button:after {
      --sy: var(--progress, 0);
      --b: var(--street-fill);
    }
    .truck-button .success svg {
      width: 12px;
      height: 10px;
      display: inline-block;
      vertical-align: top;
      fill: none;
      margin: 7px 0 0 12px;
      stroke: var(--tick);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 16px;
      stroke-dashoffset: var(--offset, 16px);
      transition: stroke-dashoffset 0.4s ease 0.45s;
    }
    .truck-button .truck {
      position: absolute;
      width: 72px;
      height: 28px;
      transform: rotateX(90deg) translate3d(var(--truck-x, 4px), calc(var(--truck-y-n, -26) * 1px), 12px);
    }
    .truck-button .truck:before, .truck-button .truck:after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: var(--l, 18px);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      z-index: 2;
      box-shadow: inset 0 0 0 2px var(--wheel), inset 0 0 0 4px var(--wheel-inner);
      background: var(--wheel-dot);
      transform: translateY(calc(var(--truck-y) * -1px)) translateZ(0);
    }
    .truck-button .truck:after { --l: 54px; }
    .truck-button .truck .wheel, .truck-button .truck .wheel:before {
      position: absolute;
      bottom: var(--b, -6px);
      left: var(--l, 6px);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--wheel);
      transform: translateZ(0);
    }
    .truck-button .truck .wheel { transform: translateY(calc(var(--truck-y) * -1px)) translateZ(0); }
    .truck-button .truck .wheel:before { --l: 35px; --b: 0; content: ''; }
    .truck-button .truck .front, .truck-button .truck .back, .truck-button .truck .box { position: absolute; }
    .truck-button .truck .back {
      left: 0; bottom: 0; z-index: 1; width: 47px; height: 28px;
      border-radius: 1px 1px 0 0;
      background: linear-gradient(68deg, var(--back-inner) 0%, var(--back-inner) 22%, var(--back-inner-shadow) 22.1%, var(--back-inner-shadow) 100%);
    }
    .truck-button .truck .back:before, .truck-button .truck .back:after { content: ''; position: absolute; }
    .truck-button .truck .back:before {
      left: 11px; top: 0; right: 0; bottom: 0; z-index: 2;
      border-radius: 0 1px 0 0; background: var(--back);
    }
    .truck-button .truck .back:after { border-radius: 1px; width: 73px; height: 2px; left: -1px; bottom: -2px; background: var(--base); }
    .truck-button .truck .front {
      left: 47px; bottom: -1px; height: 22px; width: 24px;
      -webkit-clip-path: polygon(55% 0, 72% 44%, 100% 58%, 100% 100%, 0 100%, 0 0);
      clip-path: polygon(55% 0, 72% 44%, 100% 58%, 100% 100%, 0 100%, 0 0);
      background: linear-gradient(84deg, var(--front-shadow) 0%, var(--front-shadow) 10%, var(--front) 12%, var(--front) 100%);
    }
    .truck-button .truck .front:before, .truck-button .truck .front:after { content: ''; position: absolute; }
    .truck-button .truck .front:before {
      width: 7px; height: 8px; left: 7px; top: 2px;
      -webkit-clip-path: polygon(0 0, 60% 0%, 100% 100%, 0% 100%);
      clip-path: polygon(0 0, 60% 0%, 100% 100%, 0% 100%);
      background: linear-gradient(59deg, var(--window) 0%, var(--window) 57%, var(--window-shadow) 55%, var(--window-shadow) 100%);
    }
    .truck-button .truck .front:after { width: 3px; height: 2px; right: 0; bottom: 3px; background: var(--front-light); }
    .truck-button .truck .box {
      width: 13px; height: 13px; right: 56px; bottom: 0; z-index: 1;
      border-radius: 1px; overflow: hidden;
      transform: translate(calc(var(--box-x, -24) * 1px), calc(var(--box-y, -6) * 1px)) scale(var(--box-s, 0.5));
      opacity: var(--box-o, 0);
      background: linear-gradient(68deg, var(--box) 0%, var(--box) 50%, var(--box-shadow) 50.2%, var(--box-shadow) 100%);
      background-size: 250% 100%;
      background-position-x: calc(var(--bx, 0) * 1%);
    }
    .truck-button .truck .box:before, .truck-button .truck .box:after { content: ''; position: absolute; }
    .truck-button .truck .box:before { background: rgba(255,255,255,0.2); left: 0; right: 0; top: 6px; height: 1px; }
    .truck-button .truck .box:after { width: 6px; left: 100%; top: 0; bottom: 0; background: var(--back); transform: translateX(calc(var(--hx, 0) * 1px)); }
    .truck-button.animation { --rx: -90deg; --br: 0; }
    .truck-button.animation .default { --o: 0; }
    .truck-button.animation.done { --rx: 0deg; --br: 14px; --br-d: .2s; }
    .truck-button.animation.done .success { --o: 1; --offset: 0; }

    /* ── ABOUT ── */
    #about { background: #fff; }
    .about-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
    .about-feature-list { list-style: none; display: flex; flex-direction: column; gap: 0.85rem; margin-top: 2rem; }
    .about-feature-list li {
      display: flex; gap: 0.85rem; align-items: flex-start; font-size: 0.88rem;
      color: var(--stone); font-weight: 300; line-height: 1.68; padding: 0.8rem 1rem; border-radius: 10px;
      border: 1px solid transparent; transition: all 0.22s; cursor: default;
    }
    .about-feature-list li:hover { background: var(--rust-ultra); border-color: rgba(201,76,30,0.12); }
    .feat-dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--rust), var(--gold)); flex-shrink: 0; margin-top: 5px; }
    .about-visual {
      background: var(--parchment); border-radius: 24px; padding: 2rem;
      border: 1px solid var(--border); display: flex; flex-direction: column; gap: 1.2rem;
    }
    .about-stat-row { display: flex; gap: 1rem; }
    .about-stat-box {
      flex: 1; background: #fff; border-radius: 14px; padding: 1.4rem 1rem;
      border: 1px solid var(--border); text-align: center; transition: all 0.25s; cursor: default;
    }
    .about-stat-box:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: rgba(201,76,30,0.22); }
    .astat-val { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: var(--rust); }
    .astat-label { font-size: 0.66rem; color: var(--stone-light); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 4px; }
    .about-quote {
      background: linear-gradient(135deg, var(--rust) 0%, #9e3412 100%);
      border-radius: 16px; padding: 1.8rem; font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.06rem; line-height: 1.68; color: #fff; position: relative; overflow: hidden;
    }
    .about-quote::before {
      content: '\201C'; position: absolute; top: -18px; left: 12px;
      font-size: 7rem; opacity: 0.1; font-style: normal; line-height: 1;
    }
    .about-quote-attr { font-family: 'Outfit', sans-serif; font-style: normal; font-size: 0.74rem; color: rgba(255,255,255,0.55); margin-top: 0.85rem; font-weight: 500; letter-spacing: 0.06em; }

    /* ── REVIEWS ── */
    #reviews { background: var(--parchment); }
    .reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 1.4rem; }
    .review-card {
      background: #fff; border-radius: 16px; padding: 1.7rem;
      border: 1px solid var(--border); transition: all 0.3s var(--ease); position: relative; overflow: hidden;
    }
    .review-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--rust), var(--gold));
      transform: scaleX(0); transform-origin: left; transition: transform 0.35s var(--ease);
    }
    .review-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
    .review-card:hover::after { transform: scaleX(1); }
    .review-stars { display: flex; gap: 3px; margin-bottom: 0.9rem; }
    .star-svg { width: 13px; height: 13px; fill: var(--gold); flex-shrink: 0; }
    .review-text { font-size: 0.88rem; color: var(--stone); line-height: 1.74; font-weight: 300; margin-bottom: 1.15rem; font-style: italic; }
    .review-meta { display: flex; align-items: center; gap: 0.75rem; }
    .reviewer-initial {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--rust-pale); color: var(--rust);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.84rem; flex-shrink: 0;
      border: 2px solid rgba(201,76,30,0.14); overflow: hidden;
    }
    .reviewer-initial img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .reviewer-name { font-weight: 600; color: var(--ink); font-size: 0.85rem; }
    .reviewer-sub { font-size: 0.71rem; color: var(--stone-light); margin-top: 1px; }
    .review-product-tag {
      display: inline-block; margin-top: 0.85rem;
      background: var(--parchment); color: var(--stone);
      font-size: 0.66rem; font-weight: 600; padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border); letter-spacing: 0.06em; text-transform: uppercase;
    }
    .reviews-empty { grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--stone-light); font-size: 0.9rem; }
    .reviews-loading { grid-column: 1 / -1; display: flex; justify-content: center; padding: 3rem; }
    .reviews-loading span { width: 26px; height: 26px; border: 2.5px solid var(--border); border-top-color: var(--rust); border-radius: 50%; animation: spin 0.8s linear infinite; }

    /* ── WRITE REVIEW ── */
    #write-review { background: #fff; display: none; }
    #write-review.active { display: block; }
    .review-form-wrap {
      max-width: 620px; margin: 0 auto;
      background: var(--parchment); border-radius: 22px; padding: 2.5rem;
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .form-row { margin-bottom: 1.35rem; }
    .form-label { display: block; font-size: 0.73rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone); margin-bottom: 0.5rem; }
    .form-input, .form-textarea, .form-select {
      width: 100%; background: #fff; border: 1.5px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      font-family: 'Outfit', sans-serif; font-size: 0.88rem; color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--rust); box-shadow: 0 0 0 3px rgba(201,76,30,0.08);
    }
    .form-textarea { resize: vertical; min-height: 120px; line-height: 1.65; }
    .star-rating { display: flex; gap: 4px; flex-direction: row-reverse; justify-content: flex-end; }
    .star-rating input { display: none; }
